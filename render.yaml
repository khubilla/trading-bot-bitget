services:
  # ── Live Dashboard (web) ────────────────────────────────────────────
  - type: web
    name: bitget-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard:app --host 0.0.0.0 --port $PORT
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_API_SECRET
        sync: false
      - key: BITGET_API_PASSPHRASE
        sync: false
      # Redirect state.json and trades.csv to the shared disk
      - key: DATA_DIR
        value: /data

  # ── Live Bot (background worker) ───────────────────────────────────
  - type: worker
    name: bitget-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_API_SECRET
        sync: false
      - key: BITGET_API_PASSPHRASE
        sync: false
      - key: DATA_DIR
        value: /data
