services:
  # ── Live Dashboard (web) ────────────────────────────────────────────
  - type: web
    name: bitget-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard:app --host 0.0.0.0 --port $PORT
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_API_SECRET
        sync: false
      - key: BITGET_API_PASSPHRASE
        sync: false
      - key: DATA_DIR
        value: /data

  # ── Live Bot (background worker) ───────────────────────────────────
  - type: worker
    name: bitget-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_API_SECRET
        sync: false
      - key: BITGET_API_PASSPHRASE
        sync: false
      - key: DATA_DIR
        value: /data

  # ── Paper Dashboard (web) ───────────────────────────────────────────
  - type: web
    name: bitget-paper-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard:app --host 0.0.0.0 --port $PORT
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_API_SECRET
        sync: false
      - key: BITGET_API_PASSPHRASE
        sync: false
      - key: DATA_DIR
        value: /data
      # Tells dashboard.py to read state_paper.json instead of state.json
      - key: PAPER_MODE
        value: "1"

  # ── Paper Bot (background worker) ──────────────────────────────────
  - type: worker
    name: bitget-paper-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py --paper
    disk:
      name: bot-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: BITGET_API_KEY
        sync: false
      - key: BITGET_API_SECRET
        sync: false
      - key: BITGET_API_PASSPHRASE
        sync: false
      - key: DATA_DIR
        value: /data
