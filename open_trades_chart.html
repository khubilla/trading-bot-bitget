// Entry candle timestamps (ms)
const ENTRY_TS = {
  UNIUSDT:  1774857600000, // 08:00 UTC candle (entry 08:05)
  AVAXUSDT: 1774859400000, // 08:30 UTC candle (entry 08:38)
  WLDUSDT:  1774860300000, // 08:45 UTC candle (entry 08:52)
};

function fmt(v, sym) {
  if (sym === 'WLDUSDT') return v.toFixed(5);
  if (sym === 'AVAXUSDT') return v.toFixed(4);
  return v.toFixed(4);
}

function tsToTime(ts) {
  const d = new Date(ts);
  return d.toISOString().slice(11, 16) + ' UTC';
}

function drawChart(canvasId, sym, candles, trade) {
  const canvas = document.getElementById(canvasId);
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const PAD_L = 10, PAD_R = 70, PAD_T = 16, PAD_B = 50;
  const VOL_H = 40;
  const chartH = H - PAD_T - PAD_B - VOL_H - 8;

  // Show last 50 candles
  const view = candles.slice(-50);
  const entryTs = ENTRY_TS[sym];

  // Price range — include SL and TP in range
  const lows  = view.map(c => c.l);
  const highs = view.map(c => c.h);
  let minP = Math.min(...lows, trade.sl);
  let maxP = Math.max(...highs, trade.tp);
  const pad = (maxP - minP) * 0.05;
  minP -= pad; maxP += pad;

  const priceToY = p => PAD_T + chartH * (1 - (p - minP) / (maxP - minP));

  const n = view.length;
  const candleW = Math.floor((W - PAD_L - PAD_R) / n);
  const gap = Math.max(1, Math.round(candleW * 0.15));
  const bodyW = candleW - gap * 2;

  const idxToX = i => PAD_L + i * candleW + Math.floor(candleW / 2);

  // Background
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const y = PAD_T + i * chartH / 5;
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    const p = maxP - i * (maxP - minP) / 5;
    ctx.fillStyle = '#484f58';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(fmt(p, sym), W - PAD_R + 4, y + 3);
  }

  // Helper: dashed horizontal line
  function hLine(price, color, label, labelSide = 'right') {
    const y = priceToY(price);
    if (y < PAD_T - 5 || y > PAD_T + chartH + 5) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(PAD_L, y); ctx.lineTo(W - PAD_R, y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`${label} ${fmt(price, sym)}`, W - PAD_R + 4, y - 2);
  }

  // Draw SL (original), current SL, trigger, entry, TP
  hLine(trade.snap_sl,  '#7d3535', 'SL₀');
  hLine(trade.sl,       '#f85149', 'SL');
  hLine(trade.trigger,  '#e3b341', 'TRG');
  hLine(trade.entry,    '#58a6ff', 'ENT');
  hLine(trade.tp,       '#3fb950', 'TP');

  const lastRedTs   = trade.last_red_ts;
  const lastGreenTs = trade.last_green_ts;

  // Candles
  view.forEach((c, i) => {
    const x = idxToX(i);
    const isEntry    = c.t === entryTs;
    const isLastRed  = c.t === lastRedTs;
    const isUptick   = c.t === lastGreenTs;
    const bull = c.c >= c.o;

    // Background highlights
    if (isEntry) {
      ctx.fillStyle = 'rgba(88,166,255,0.08)';
      ctx.fillRect(PAD_L + i * candleW, PAD_T, candleW, chartH);
    }
    if (isLastRed) {
      ctx.fillStyle = 'rgba(248,81,73,0.10)';
      ctx.fillRect(PAD_L + i * candleW, PAD_T, candleW, chartH);
    }
    if (isUptick) {
      ctx.fillStyle = 'rgba(227,179,65,0.10)';
      ctx.fillRect(PAD_L + i * candleW, PAD_T, candleW, chartH);
    }

    const bodyColor = isEntry   ? '#f0f6fc'
                    : isUptick  ? '#f0c060'
                    : isLastRed ? '#ff6b6b'
                    : (bull     ? '#3fb950' : '#f85149');
    const wickColor = isEntry   ? '#c9d1d9'
                    : isUptick  ? '#c9a030'
                    : isLastRed ? '#cc4444'
                    : (bull     ? '#2ea043' : '#da3633');

    // Wick
    ctx.strokeStyle = wickColor;
    ctx.lineWidth = 1;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(x, priceToY(c.h));
    ctx.lineTo(x, priceToY(c.l));
    ctx.stroke();

    // Body
    const yO = priceToY(c.o), yC = priceToY(c.c);
    const bodyTop = Math.min(yO, yC);
    const bodyHeight = Math.max(Math.abs(yC - yO), 1);
    ctx.fillStyle = bodyColor;
    ctx.fillRect(PAD_L + i * candleW + gap, bodyTop, bodyW, bodyHeight);
    if (!bull && !isEntry && !isLastRed && !isUptick) {
      ctx.strokeStyle = '#da3633'; ctx.lineWidth = 0.5;
      ctx.strokeRect(PAD_L + i * candleW + gap, bodyTop, bodyW, bodyHeight);
    }

    // Candle labels (below chart)
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    if (isLastRed) {
      ctx.fillStyle = '#ff6b6b';
      ctx.fillText('LAST RED', x, PAD_T + chartH + 14);
    }
    if (isUptick) {
      ctx.fillStyle = '#e3b341';
      ctx.fillText('UPTICK', x, PAD_T + chartH + 14);
    }
    if (isEntry) {
      ctx.fillStyle = '#58a6ff';
      ctx.fillText('▲ ENTRY', x, PAD_T + chartH + 14);
    }
  });

  // Volume bars
  const volMax = Math.max(...view.map(c => c.v));
  const volYBase = PAD_T + chartH + 8 + VOL_H;
  view.forEach((c, i) => {
    const bull = c.c >= c.o;
    const isEntry = c.t === entryTs;
    ctx.fillStyle = isEntry ? 'rgba(88,166,255,0.6)' : (bull ? 'rgba(62,175,84,0.35)' : 'rgba(248,81,73,0.35)');
    const vh = Math.max(1, (c.v / volMax) * VOL_H);
    ctx.fillRect(PAD_L + i * candleW + gap, volYBase - vh, bodyW, vh);
  });

  // X-axis time labels (every 4 candles)
  ctx.fillStyle = '#6e7681';
  ctx.font = '9px monospace';
  ctx.textAlign = 'center';
  view.forEach((c, i) => {
    if (i % 4 === 0) {
      ctx.fillText(tsToTime(c.t).slice(0,5), idxToX(i), H - 4);
    }
  });
}

function buildCharts() {
  const container = document.getElementById('charts');
  DATA.trades.forEach((trade, idx) => {
    const sym = trade.symbol;
    const candles = DATA.candles[sym];
    const lastC = candles[candles.length - 1].c;
    const pnlPct = ((lastC - trade.entry) / trade.entry * 100).toFixed(2);
    const pnlSign = pnlPct > 0 ? '+' : '';
    const pnlClass = pnlPct > 0 ? 'bull' : 'red';

    const wrap = document.createElement('div');
    wrap.className = 'chart-wrap';
    wrap.innerHTML = `
      <div class="chart-title">
        <span class="sym">${sym}</span>
        <div class="meta">
          <span class="blu">Entry ${trade.entry}</span>
          <span class="red">SL ${trade.sl.toFixed(6)}</span>
          <span class="bull">TP ${trade.tp}</span>
          <span class="yel">ADX ${trade.adx}</span>
          <span class="yel">R:R ${trade.rr}</span>
          <span class="${pnlClass}">Now ${lastC} (${pnlSign}${pnlPct}%)</span>
        </div>
      </div>
      <canvas id="c${idx}" style="height:280px;"></canvas>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div><span style="color:#ff6b6b">Last red candle</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#f0c060"></div><span style="color:#e3b341">Uptick (trigger) candle</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#f0f6fc"></div><span style="color:#8b949e">Entry candle</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#58a6ff"></div><span style="color:#58a6ff">Entry price</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#e3b341"></div><span style="color:#e3b341">Trigger level</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div><span style="color:#f85149">SL / SL₀</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div><span style="color:#3fb950">TP</span></div>
      </div>
      <div class="now-label">15m · last 50 candles · entry at ${trade.opened_at} UTC</div>
    `;
    container.appendChild(wrap);

    // Draw after layout
    requestAnimationFrame(() => {
      const canvas = document.getElementById(`c${idx}`);
      canvas.style.width = '100%';
      canvas.style.height = '280px';
      canvas.width = canvas.clientWidth;
      canvas.height = 280;
      drawChart(`c${idx}`, sym, candles, trade);
    });
  });
}

buildCharts();
window.addEventListener('resize', () => {
  DATA.trades.forEach((trade, idx) => {
    drawChart(`c${idx}`, trade.symbol, DATA.candles[trade.symbol], trade);
  });
});
</script>
